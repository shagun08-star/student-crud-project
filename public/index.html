<<!DOCTYPE html>
<html>

<head>

<title>Student Form</title>

</head>

<body>

<h1>Add Student</h1>

<form action="/student" method="POST">

<label>Name</label>
<br>

<input
type="text"
name="name"
placeholder="Enter Name"
required>

<br><br>

<label>Age</label>
<br>

<input
type="number"
name="age"
placeholder="Enter Age"
required>

<br><br>

<label>City</label>
<br>

<input
type="text"
name="city"
placeholder="Enter City"
required>

<br><br>

<button type="submit">

Save Student

</button>

</form>

</body>

</html>
